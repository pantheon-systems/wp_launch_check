name: Behat tests
on:
  pull_request:
    branches:
      - master
      - main

jobs:
  validate:
    name: "Run validation test suite"
    runs-on: ubuntu-latest

    env:
      WP_CLI_TEST_DBHOST: 127.0.0.1
      WP_CLI_TEST_DBNAME: pantheon
      WP_CLI_TEST_DBUSER: pantheon
      WP_CLI_TEST_DBPASS: pantheon

    services:
      mysql:
        image: mysql:5.7
        env:
          MYSQL_DATABASE: pantheon
          MYSQL_HOST: 127.0.0.1
          MYSQL_USER: pantheon
          MYSQL_PASSWORD: pantheon
          MYSQL_ROOT_PASSWORD: rootpass
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Checkout
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1

      - name: Setup PHP
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # v2
        with:
          php-version: 7.4
          ini-values: post_max_size=256M, max_execution_time=120

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer Downloads
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Cache PHP dependencies
        uses: actions/cache@9255dc7a253b0ccc959486e2bca901246202afeb # v5.0.1
        with:
          path: vendor
          key: ${{ runner.OS }}-build-${{ hashFiles('**/composer.lock') }}

      - name: Install composer dependencies
        run: |
          composer --no-interaction --no-progress --prefer-dist install

      - name: Run Behat tests
        run: |
          composer behat
